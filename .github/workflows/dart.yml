The issue is not Flutter itself.
Your app runs in the iOS simulator because the simulator does not require the full CocoaPods/device build environment that a real iOS release build needs.

The actual problem is this line:

The sandbox is not in sync with the Podfile.lock

That means:

Your ios/Podfile.lock says one set of iOS dependencies should exist

But the Pods/ directory generated during CI contains something different

So Xcode refuses to build

This usually happens when:

pod install was never run in GitHub Actions

Podfile.lock is outdated

Flutter plugins changed

CocoaPods version mismatch

Pods/Manifest.lock and Podfile.lock differ

The emulator can still work because:

it may use cached pods locally

simulator builds are more forgiving

CI starts from a clean environment every time

Exact Fix
In your GitHub Action, before:

flutter build ios --release --no-codesign
you MUST run:

cd ios
pod install
cd ..
But that's still incomplete.

The proper workflow should be:

- name: Install Flutter dependencies
  run: flutter pub get

- name: Install CocoaPods dependencies
  run: |
    cd ios
    pod install
    cd ..

- name: Build IPA
  run: flutter build ios --release --no-codesign
Better Fix (Recommended)
Sometimes CI caches stale pods.

So do this instead:

- name: Clean Flutter
  run: flutter clean

- name: Get Flutter packages
  run: flutter pub get

- name: Remove old pods
  run: |
    cd ios
    rm -rf Pods
    rm -rf .symlinks
    rm -f Podfile.lock
    pod repo update
    pod install
    cd ..

- name: Build iOS
  run: flutter build ios --release --no-codesign
Another Important Reality You're Probably Missing
If you're using packages like:

path_provider

wakelock_plus

permission_handler

camera

livekit_client

firebase_*

then all of them use native iOS pods.

Meaning:

Android build success means nothing

iOS simulator success means very little

CocoaPods setup becomes mandatory

Also Check This
Your GitHub runner MUST be macOS.

This:

runs-on: macos-latest
is required.

If you are using Ubuntu runner:

IPA build is impossible

Xcode is unavailable

One More Common Mistake
If you recently added Flutter plugins and forgot to commit:

ios/Podfile.lock
then CI breaks exactly like this.

So locally run:

flutter clean
flutter pub get
cd ios
pod install
then commit:

ios/Podfile.lock

Do NOT commit:

Pods/

Recommended Final GitHub Action
name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'

      - name: Flutter Clean
        run: flutter clean

      - name: Install Dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod repo update
          pod install
          cd ..

      - name: Build iOS
        run: flutter build ios --release --no-codesign
Important Limitation You Should Understand
flutter build ios --no-codesign

does NOT create a fully installable IPA for App Store/TestFlight automatically.

Without:

Apple Developer account

certificates

provisioning profiles

signing

you only get an unsigned archive/build.

A lot of developers think:

"If CI builds iOS, I can install it directly."

No. Apple ecosystem does not work like Android.

Eventually you will need:

a Mac (physical or cloud)

or Codemagic/Xcode Cloud/MacStadium

Apple signing setup

There is no permanent shortcut around Apple's signing system.


